<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inglés">
  <meta name="theme-color" content="#0f0f17">
  <title>Profesora de Inglés</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main id="app">
    <!-- Pantalla de selección -->
    <section id="picker" class="screen active">
      <h1>¿Quién va a practicar?</h1>
      <p class="subtitle">Elige un perfil para empezar la conversación</p>
      <div class="cards" id="modeCards"></div>
      <p class="hint">Necesitas dar permiso al micrófono la primera vez.</p>
    </section>

    <!-- Pantalla de conversación -->
    <section id="conversation" class="screen">
      <header class="conv-header">
        <button id="backBtn" class="back-btn" aria-label="Volver">←</button>
        <div class="conv-title">
          <h2 id="convLabel">Peace</h2>
          <span id="convStatus" class="status-pill">Conectando…</span>
        </div>
        <button id="endBtn" class="end-btn" hidden>Terminar</button>
      </header>

      <div class="avatar-wrap">
        <canvas id="avatarCanvas" class="avatar-canvas"></canvas>
        <div id="orb" class="orb idle" hidden></div>
        <div id="avatarLoader" class="avatar-loader" hidden>Cargando avatar…</div>
      </div>

      <div id="transcript" class="transcript"></div>

      <footer class="conv-footer">
        <button id="muteBtn" class="control-btn" hidden>🎙️ Silenciar</button>
      </footer>
    </section>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/static/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>

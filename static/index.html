<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inglés">
  <meta name="theme-color" content="#0f0f17">
  <title>Profesora de Inglés</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/styles.css?v=14">
</head>
<body>
  <main id="app">
    <!-- Pantalla de selección -->
    <section id="picker" class="screen active">
      <h1>¿Quién va a practicar?</h1>
      <p class="subtitle">Elige un perfil para empezar</p>
      <div class="cards" id="modeCards"></div>
      <p class="hint">Necesitas dar permiso al micrófono la primera vez.</p>
    </section>

    <!-- Pantalla de elección de actividad (después de elegir perfil) -->
    <section id="subpicker" class="screen">
      <header class="conv-header">
        <button class="back-btn" id="subBackBtn" aria-label="Volver">←</button>
        <div class="conv-title">
          <h2 id="subLabel">Peace</h2>
          <span class="status-pill" id="subSubtitle">¿Qué hacemos hoy?</span>
        </div>
        <span class="back-btn" style="visibility:hidden">←</span>
      </header>
      <div class="activity-cards">
        <button class="activity-card" id="actSpeak">
          <div class="act-icon">🎙️</div>
          <div class="act-info">
            <div class="act-name">Hablar</div>
            <div class="act-sub">Conversación por voz en tiempo real</div>
          </div>
          <div class="act-arrow">→</div>
        </button>
        <button class="activity-card" id="actGrammar">
          <div class="act-icon">📚</div>
          <div class="act-info">
            <div class="act-name">Gramática</div>
            <div class="act-sub">Lección del día + 5 ejercicios</div>
          </div>
          <div class="act-arrow">→</div>
        </button>
        <button class="activity-card" id="actVocab">
          <div class="act-icon">🃏</div>
          <div class="act-info">
            <div class="act-name">Vocabulario</div>
            <div class="act-sub">Phrasal verbs nuevos + repaso del día</div>
          </div>
          <div class="act-arrow">→</div>
        </button>
      </div>
    </section>

    <!-- Pantalla de gramática -->
    <section id="grammar" class="screen">
      <header class="conv-header">
        <button class="back-btn" id="gramBackBtn" aria-label="Volver">←</button>
        <div class="conv-title">
          <h2 id="gramLabel">Gramática</h2>
          <span class="status-pill" id="gramStatus">Cargando…</span>
        </div>
        <span class="back-btn" style="visibility:hidden">←</span>
      </header>
      <div class="grammar-body" id="grammarBody">
        <div class="grammar-loading" id="grammarLoading">Generando tu lección de hoy…</div>
      </div>
    </section>

    <!-- Pantalla de vocabulario -->
    <section id="vocab" class="screen">
      <header class="conv-header">
        <button class="back-btn" id="vocabBackBtn" aria-label="Volver">←</button>
        <div class="conv-title">
          <h2 id="vocabLabel">Vocabulario</h2>
          <span class="status-pill" id="vocabStatus">Cargando…</span>
        </div>
        <span class="back-btn" style="visibility:hidden">←</span>
      </header>
      <div class="grammar-body" id="vocabBody">
        <div class="grammar-loading" id="vocabLoading">Preparando tus phrasal verbs…</div>
      </div>
    </section>

    <!-- Pantalla de conversación -->
    <section id="conversation" class="screen">
      <header class="conv-header">
        <button id="backBtn" class="back-btn" aria-label="Volver">←</button>
        <div class="conv-title">
          <h2 id="convLabel">Peace</h2>
          <span id="convStatus" class="status-pill">Conectando…</span>
        </div>
        <button id="endBtn" class="end-btn" hidden>Terminar</button>
      </header>

      <div class="orb-wrap">
        <div id="orb" class="orb idle"></div>
      </div>

      <div id="transcript" class="transcript"></div>

      <footer class="conv-footer">
        <button id="muteBtn" class="control-btn" hidden>🎙️ Silenciar</button>
      </footer>
    </section>
  </main>

  <script type="module" src="/static/app.js?v=14"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
